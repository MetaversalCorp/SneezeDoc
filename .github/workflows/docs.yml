# Docs — validate wiki transform (dry-run) on PR and push.
# Live publish: .github/workflows/deploy-wiki.yml
#
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wiki-transform:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run wiki transform
        run: python scripts/publish-wiki.py --dry-run --all
