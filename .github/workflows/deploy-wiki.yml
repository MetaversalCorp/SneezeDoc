# Deploy Wiki — push docs/ to omb.wiki (Wiki.js GraphQL) via publish-wiki.py.
#
# Auto-runs on push to main when docs/ or the publish script changes.
# Manual: Actions -> Deploy Wiki -> Run workflow (optional target / dry_run).
#
# Secret: WIKIJS_API_TOKEN (read:pages + write:pages on the API group)
# Optional: WIKIJS_GRAPHQL_URL, CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET
#
name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/publish-wiki.py'
      - 'scripts/check-wiki-token.py'
      - '.github/workflows/deploy-wiki.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Wiki.js GraphQL endpoint
        required: true
        default: https://omb.wiki/graphql
      dry_run:
        description: Transform only (no API writes)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-wiki
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish docs/ to Wiki.js
        env:
          WIKIJS_GRAPHQL_URL: ${{ github.event.inputs.target || secrets.WIKIJS_GRAPHQL_URL || 'https://omb.wiki/graphql' }}
          WIKIJS_API_TOKEN: ${{ secrets.WIKIJS_API_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/publish-wiki.py --dry-run --all
          else
            python scripts/publish-wiki.py --all --skip-render
          fi
